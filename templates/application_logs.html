{% extends "base.html" %}

{% block title %}Application Logs - Hirevue{% endblock %}

{% block content %}
<div class="container-fluid py-5">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="card shadow-lg border-0 rounded-3">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">
                        <i class="fas fa-history me-2"></i>Application Activity Log
                    </h5>
                </div>
                <div class="card-body">
                    <div class="timeline">
                        {% for log in logs %}
                        <div class="timeline-item mb-4">
                            <div class="timeline-marker" style="width: 40px; height: 40px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white;">
                                <i class="fas fa-check-circle"></i>
                            </div>
                            <div class="ms-3">
                                <h6 class="fw-bold">{{ log[0] }}</h6>
                                <p class="text-muted mb-1">{{ log[1] }}</p>
                                <small class="text-secondary">{{ log[2] }}</small>
                            </div>
                        </div>
                        {% else %}
                        <div class="text-center text-muted py-5">
                            <i class="fas fa-inbox fa-3x mb-3"></i>
                            <p>No activity logs found</p>
                        </div>
                        {% endfor %}
                    </div>
                </div>
            </div>

            <div class="mt-4">
                <a href="{{ '/view_applications' if session.get('admin') else '/user_dashboard' }}" class="btn btn-outline-secondary">
                    <i class="fas fa-arrow-left me-2"></i>Back to Applications
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
