{% extends "base.html" %}

{% block title %}Admin Login - Hirevue{% endblock %}

{% block content %}
<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center">
    <div class="row w-100 justify-content-center">
        <div class="col-md-6 col-lg-5 col-xl-4">
            <div class="card shadow-lg border-0 rounded-3">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-user-shield fa-3x text-warning mb-3"></i>
                        <h2 class="fw-bold">Admin Access</h2>
                        <p class="text-muted">Authorized personnel only</p>
                    </div>

                    <!-- Error Message -->
                    {% if error %}
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="fas fa-exclamation-triangle me-2"></i>{{ error }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    {% endif %}

                    <form method="POST">
                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold">
                                <i class="fas fa-user me-2"></i>Username
                            </label>
                            <input type="text" class="form-control form-control-lg" id="username" name="username" required placeholder="Enter admin username">
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold">
                                <i class="fas fa-lock me-2"></i>Password
                            </label>
                            <input type="password" class="form-control form-control-lg" id="password" name="password" required placeholder="Enter admin password">
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-warning btn-lg fw-bold">
                                <i class="fas fa-sign-in-alt me-2"></i>Admin Login
                            </button>
                        </div>
                    </form>

                    <div class="text-center mt-4">
                        <p class="text-muted mb-2">Not an admin?</p>
                        <div class="d-flex justify-content-center gap-2">
                            <a href="/user_login" class="btn btn-outline-primary btn-sm">
                                <i class="fas fa-user me-1"></i>User Login
                            </a>
                            <a href="/company_login" class="btn btn-outline-secondary btn-sm">
                                <i class="fas fa-building me-1"></i>Company Login
                            </a>
                        </div>
                    </div>

                    <div class="alert alert-info mt-4" role="alert">
                        <i class="fas fa-info-circle me-2"></i>
                        <small>This area is restricted to authorized administrators only.</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Focus username input on page load
document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('username').focus();
});
</script>
{% endblock %}
