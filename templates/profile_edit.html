{% extends "base.html" %}

{% block title %}Edit Profile - Hirevue{% endblock %}

{% block content %}
<div class="container-fluid py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-lg border-0 rounded-3">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-user-circle fa-4x text-primary mb-3"></i>
                        <h2 class="fw-bold">Edit Profile</h2>
                        <p class="text-muted">Update your personal information</p>
                    </div>

                    {% if error %}
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="fas fa-exclamation-circle me-2"></i>{{ error }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    {% endif %}

                    <form method="POST">
                        <div class="mb-3">
                            <label for="name" class="form-label fw-semibold">
                                <i class="fas fa-user me-2"></i>Full Name
                            </label>
                            <input type="text" class="form-control form-control-lg" id="name" name="name" value="{{ user[0] or '' }}" required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold">
                                <i class="fas fa-envelope me-2"></i>Email Address
                            </label>
                            <input type="email" class="form-control form-control-lg" id="email" name="email" value="{{ user[1] or '' }}" required>
                        </div>

                        <div class="mb-3">
                            <label for="location" class="form-label fw-semibold">
                                <i class="fas fa-map-marker-alt me-2"></i>Location
                            </label>
                            <input type="text" class="form-control form-control-lg" id="location" name="location" value="{{ user[2] or '' }}" placeholder="City, Country">
                        </div>

                        <div class="mb-3">
                            <label for="birthday" class="form-label fw-semibold">
                                <i class="fas fa-birthday-cake me-2"></i>Birthday
                            </label>
                            <input type="date" class="form-control form-control-lg" id="birthday" name="birthday" value="{{ user[3] or '' }}">
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold">
                                <i class="fas fa-lock me-2"></i>New Password (Optional)
                            </label>
                            <input type="password" class="form-control form-control-lg" id="password" name="password" placeholder="Leave blank to keep current password">
                            <small class="text-muted">Must be at least 6 characters</small>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg fw-bold">
                                <i class="fas fa-save me-2"></i>Save Changes
                            </button>
                            <a href="/user_dashboard" class="btn btn-outline-secondary btn-lg">
                                <i class="fas fa-times me-2"></i>Cancel
                            </a>
                        </div>
                    </form>

                    <hr class="my-4">

                    <!-- Profile Picture Upload -->
                    <div class="text-center">
                        <h6 class="fw-bold mb-3">Profile Picture</h6>
                        <form method="POST" action="/upload_profile_pic" enctype="multipart/form-data">
                            <div class="mb-3">
                                <input type="file" class="form-control" name="profile_pic" accept="image/*" required>
                            </div>
                            <button type="submit" class="btn btn-outline-primary btn-sm">
                                <i class="fas fa-upload me-2"></i>Upload Picture
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
