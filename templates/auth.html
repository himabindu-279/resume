{% extends "base.html" %}

{% block title %}Login & Register - Hirevue{% endblock %}

{% block content %}
<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center">
    <div class="row w-100 justify-content-center">
        <div class="col-md-8 col-lg-6 col-xl-5">
            <div class="card shadow-lg border-0 rounded-3">
                <div class="card-body p-5">
                    <!-- Tab Navigation -->
                    <ul class="nav nav-tabs nav-fill mb-4" id="authTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active fw-bold" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab" aria-controls="login" aria-selected="true">
                                <i class="fas fa-sign-in-alt me-2"></i>Login
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link fw-bold" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button" role="tab" aria-controls="register" aria-selected="false">
                                <i class="fas fa-user-plus me-2"></i>Register
                            </button>
                        </li>
                    </ul>

                    <!-- Error Message -->
                    {% if error %}
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="fas fa-exclamation-triangle me-2"></i>{{ error }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    {% endif %}

                    <!-- Tab Content -->
                    <div class="tab-content" id="authTabsContent">
                        <!-- Login Tab -->
                        <div class="tab-pane fade show active" id="login" role="tabpanel" aria-labelledby="login-tab">
                            <form method="POST">
                                <input type="hidden" name="mode" value="login">
                                <div class="mb-3">
                                    <label for="loginEmail" class="form-label fw-semibold">
                                        <i class="fas fa-envelope me-2"></i>Email Address
                                    </label>
                                    <input type="email" class="form-control form-control-lg" id="loginEmail" name="email" required placeholder="Enter your email">
                                </div>
                                <div class="mb-4">
                                    <label for="loginPassword" class="form-label fw-semibold">
                                        <i class="fas fa-lock me-2"></i>Password
                                    </label>
                                    <input type="password" class="form-control form-control-lg" id="loginPassword" name="password" required placeholder="Enter your password">
                                </div>
                                <div class="d-grid">
                                    <button type="submit" class="btn btn-primary btn-lg fw-bold">
                                        <i class="fas fa-sign-in-alt me-2"></i>Sign In
                                    </button>
                                </div>
                            </form>
                        </div>

                        <!-- Register Tab -->
                        <div class="tab-pane fade" id="register" role="tabpanel" aria-labelledby="register-tab">
                            <form method="POST">
                                <input type="hidden" name="mode" value="register">
                                <div class="mb-3">
                                    <label for="registerName" class="form-label fw-semibold">
                                        <i class="fas fa-user me-2"></i>Full Name
                                    </label>
                                    <input type="text" class="form-control form-control-lg" id="registerName" name="name" required placeholder="Enter your full name">
                                </div>
                                <div class="mb-3">
                                    <label for="registerEmail" class="form-label fw-semibold">
                                        <i class="fas fa-envelope me-2"></i>Email Address
                                    </label>
                                    <input type="email" class="form-control form-control-lg" id="registerEmail" name="email" required placeholder="Enter your email">
                                </div>
                                <div class="mb-4">
                                    <label for="registerPassword" class="form-label fw-semibold">
                                        <i class="fas fa-lock me-2"></i>Password
                                    </label>
                                    <input type="password" class="form-control form-control-lg" id="registerPassword" name="password" required placeholder="Create a password (min 6 characters)">
                                    <div class="form-text">Password must be at least 6 characters long.</div>
                                </div>
                                <div class="d-grid">
                                    <button type="submit" class="btn btn-success btn-lg fw-bold">
                                        <i class="fas fa-user-plus me-2"></i>Create Account
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- Footer Links -->
                    <div class="text-center mt-4">
                        <p class="text-muted mb-2">Or continue as:</p>
                        <div class="d-flex justify-content-center gap-2">
                            <a href="/admin_login" class="btn btn-outline-secondary btn-sm">
                                <i class="fas fa-user-shield me-1"></i>Admin
                            </a>
                            <a href="/company_login" class="btn btn-outline-secondary btn-sm">
                                <i class="fas fa-building me-1"></i>Company
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Auto-focus first input on tab change
document.querySelectorAll('button[data-bs-toggle="tab"]').forEach(button => {
    button.addEventListener('shown.bs.tab', function (event) {
        const targetId = event.target.getAttribute('data-bs-target');
        const firstInput = document.querySelector(`${targetId} input`);
        if (firstInput) firstInput.focus();
    });
});

// Focus login email on page load
document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('loginEmail').focus();
});
</script>
{% endblock %}
